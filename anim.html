<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK BINGO DELUXE - Telegram Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #fdbb2d; --secondary: #b21f1f; --glass: rgba(255, 255, 255, 0.1); }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh; color: white; padding: 20px; background-attachment: fixed;
        }

        /* Tabs */
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .tab {
            padding: 12px 35px; font-size: 18px; border-radius: 50px; background: rgba(0, 0, 0, 0.5);
            color: white; cursor: pointer; font-weight: bold; border: 2px solid transparent; transition: 0.3s;
        }
        .tab.active { background: linear-gradient(45deg, #fdbb2d, #b21f1f); border: 2px solid white; box-shadow: 0 0 20px #fdbb2d; }

        /* Containers */
        .container {
            max-width: 1200px; margin: 0 auto; background: rgba(255, 255, 255, 0.1);
            padding: 25px; border-radius: 30px; backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.2); display: none;
        }
        .container.active { display: block; animation: fadeIn 0.5s ease; }

        /* Card Grid Selection */
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px;
            max-height: 400px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
        }
        .box {
            background: white; color: #333; padding: 15px 5px; border-radius: 10px;
            text-align: center; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .box.selected { background: #4CAF50; color: white; transform: scale(1.1); box-shadow: 0 0 15px #4CAF50; }
        .box.sold-out { background: #ff4d4d !important; color: white; cursor: not-allowed; opacity: 0.6; text-decoration: line-through; }

        /* Game Page Elements */
        .number-ball {
            display: inline-block; width: 55px; height: 55px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fdbb2d, #b21f1f);
            color: white; text-align: center; line-height: 55px; margin: 5px;
            font-weight: bold; font-size: 22px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .bingo-btn {
            background: linear-gradient(135deg, #ff4444, #b21f1f); color: white; font-size: 2.2em;
            padding: 20px 60px; border-radius: 50px; border: 3px solid gold; cursor: pointer;
            margin: 20px 0; animation: pulse 1.5s infinite; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Overlays */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px);
        }

        /* Bingo Card Display */
        .gridCard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #ddd; padding: 5px; border-radius: 10px; }
        .cell { background: white; color: black; padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; }
        .cell.marked { background: #4CAF50; color: white; }
        .cell.free { background: gold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px #ff4444; } 50% { transform: scale(1.05); box-shadow: 0 0 30px #ff4444; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab active" id="p-tab" onclick="switchTab('player')">👤 ተጫዋች</button>
        <button id="admin-tab-btn" class="tab" style="display:none;" onclick="switchTab('admin')">👑 አድሚን</button>
    </div>

    <div id="playerTab" class="container active">
        <h1 style="text-align: center; margin-bottom: 10px; text-shadow: 0 0 15px gold;">🎰 MK BINGO DELUXE</h1>
        
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 20px;">
            <h2 style="font-size: 1.2em;">💰 ባላንስ: <span id="playerBalance" style="color: gold; font-size: 1.5em;">1000</span> ETB</h2>
        </div>

        <div id="selectPage">
            <h3 style="margin-bottom: 10px;">ካርድ ይምረጡ (1-1000)</h3>
            <div id="grid" class="card-grid"></div>
            <div style="text-align: center; margin-top: 20px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px;">
                <p style="font-size: 1.2em;">የተመረጡ: <span id="selectedCount" style="color: gold;">0</span> | ጠቅላላ ዋጋ: <span id="totalPrice" style="color: gold;">0</span> ETB</p>
                <button onclick="confirmCards()" style="width: 100%; padding: 18px; background: #27ae60; border: none; border-radius: 50px; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 1.1em;">ካርድ ግዛ እና ተቀላቀል</button>
            </div>
        </div>

        <div id="gamePage" style="display: none; text-align: center;">
            <div id="timerDisplay" style="font-size: 1.5em; color: gold; margin-bottom: 10px;"></div>
            <div class="called-numbers-box" style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; min-height: 100px; margin-bottom: 20px;">
                <h4 style="margin-bottom: 10px;">የተጠሩ ቁጥሮች</h4>
                <div id="numbersList"></div>
            </div>
            <button class="bingo-btn" id="bingoBtn" onclick="callBingo()">BINGO!</button>
            <div id="gameCards" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px;"></div>
        </div>
    </div>

    <div id="adminTab" class="container">
        <h2 style="color: gold; border-bottom: 2px solid gold; padding-bottom: 10px; margin-bottom: 20px;">👑 የአድሚን መቆጣጠሪያ</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px;">
                <label>የካርድ ዋጋ (ETB):</label>
                <input type="number" id="cardPriceInput" value="10" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: none;">
            </div>
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px;">
                <label>የሽልማት አይነት:</label>
                <select id="gameTypeInput" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px;">
                    <option value="full_house">Full House</option>
                    <option value="one_row">One Row</option>
                </select>
            </div>
        </div>

        <button onclick="startNewRound()" style="width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 15px; font-weight: bold; margin-bottom: 15px; cursor: pointer;">🔄 አዲስ ዙር አስጀምር</button>
        <button onclick="drawNumber()" style="width: 100%; padding: 20px; background: #2980b9; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2em; cursor: pointer;">🔢 ቁጥር ጥራ (DRAW)</button>

        <div id="adminStats" style="margin-top: 30px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px;">
            <h3 style="margin-bottom: 10px; color: gold;">የዙሩ መረጃ</h3>
            <p>የተሸጡ ካርዶች: <span id="adminTotalCards">0</span></p>
            <p>የተሰበሰበ ብር: <span id="adminTotalPool">0</span> ETB</p>
            <p>የተጠሩ ቁጥሮች: <span id="adminNumbersCount">0</span>/75</p>
        </div>
    </div>

    <div id="winner-overlay" class="overlay">
        <h1 style="color: gold; font-size: 4em; text-shadow: 0 0 20px gold;">🎉 BINGO! 🎉</h1>
        <h2 id="winner-name" style="margin: 10px 0;"></h2>
        <div id="winner-card-box" style="margin: 20px;"></div>
        <button onclick="location.reload()" style="padding: 15px 50px; background: gold; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;">ቀጥል</button>
    </div>

    <div id="house-wins-overlay" class="overlay" style="background: rgba(178, 31, 31, 0.98);">
        <h1 style="color: white; font-size: 3em;">🛑 ጨዋታው ተጠናቋል</h1>
        <h2 style="color: gold; margin: 15px 0;">አሸናፊ የለም!</h2>
        <p style="text-align: center; max-width: 80%; line-height: 1.6; font-size: 1.2em;">ሁሉም 75 ቁጥሮች ተጠርተዋል ግን ማንም ቢንጎ አላለም። ገንዘቡ ወደ አስተዳዳሪው ገቢ ሆኗል።</p>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 15px 50px; background: white; color: #b21f1f; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;">እሺ</button>
    </div>

    <script>
        const socket = io();
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 12345678; // <-- ያንተን የቴሌግራም ID እዚህ አስገባ!

        let user = tg.initDataUnsafe?.user || { id: 0, first_name: "ተጫዋች" };
        let selectedCards = {};
        let cardPrice = 10;
        let myCards = {};

        tg.expand();
        tg.ready();

        // 1. Admin Visibility
        if (user.id === ADMIN_ID) {
            document.getElementById('admin-tab-btn').style.display = 'block';
        }

        // 2. Create Selection Grid (1-1000)
        const grid = document.getElementById("grid");
        for (let i = 1; i <= 1000; i++) {
            let d = document.createElement("div");
            d.className = "box"; d.innerText = i; d.id = `card-${i}`;
            d.onclick = () => {
                if (d.classList.contains('sold-out')) return;
                if (selectedCards[i]) {
                    delete selectedCards[i];
                    d.classList.remove('selected');
                } else {
                    selectedCards[i] = generateBingoNumbers(i);
                    d.classList.add('selected');
                }
                updateSummary();
            };
            grid.appendChild(d);
        }

        function generateBingoNumbers(seed) {
            let nums = [];
            for(let i=0; i<25; i++) nums.push(Math.floor(Math.random() * 75) + 1);
            nums[12] = "FREE";
            return nums;
        }

        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = count * cardPrice;
        }

        function switchTab(tab) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            if(tab === 'player') document.getElementById('p-tab').classList.add('active');
            else document.getElementById('admin-tab-btn').classList.add('active');
        }

        // 3. Game Logic Functions
        function confirmCards() {
            const cardIds = Object.keys(selectedCards).map(Number);
            if (cardIds.length === 0) return alert("እባክዎ መጀመሪያ ካርድ ይምረጡ!");
            
            myCards = JSON.parse(JSON.stringify(selectedCards));
            socket.emit('buy_card', { user_id: user.id, cards: cardIds, name: user.first_name });
            
            document.getElementById('selectPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';
            renderMyCards();
        }

        function renderMyCards() {
            const container = document.getElementById('gameCards');
            container.innerHTML = "";
            for (let id in myCards) {
                let cardDiv = document.createElement('div');
                cardDiv.innerHTML = `<h4 style="margin-bottom:5px;">Card #${id}</h4>`;
                let g = document.createElement('div');
                g.className = "gridCard";
                myCards[id].forEach(n => {
                    let c = document.createElement('div');
                    c.className = "cell" + (n === "FREE" ? " free" : "");
                    c.innerText = n;
                    g.appendChild(c);
                });
                cardDiv.appendChild(g);
                container.appendChild(cardDiv);
            }
        }

        // 4. Admin Controls
        function startNewRound() {
            cardPrice = document.getElementById('cardPriceInput').value;
            socket.emit('admin_start_round', { price: cardPrice });
            alert("አዲስ ዙር ተጀምሯል!");
        }

        function drawNumber() {
            socket.emit('admin_draw_number');
        }

        function callBingo() {
            socket.emit('claim_bingo', { user_id: user.id, name: user.first_name });
        }

        // 5. Socket Events
        socket.on('number_update', (data) => {
            const ball = document.createElement("span");
            ball.className = "number-ball"; ball.innerText = data.num;
            document.getElementById("numbersList").prepend(ball);
            
            // Auto-mark logic
            document.querySelectorAll('.cell').forEach(cell => {
                if(cell.innerText == data.num) cell.classList.add('marked');
            });
            document.getElementById('adminNumbersCount').innerText = data.count;
        });

        socket.on('card_locked', (data) => {
            data.cards.forEach(id => {
                const el = document.getElementById(`card-${id}`);
                if (el) { el.classList.add('sold-out'); el.innerText = "SOLD"; }
            });
        });

        socket.on('show_winner', (data) => {
            document.getElementById('winner-overlay').style.display = 'flex';
            document.getElementById('winner-name').innerText = data.winner_name;
            document.getElementById('winner-card-box').innerHTML = data.card_html;
        });

        socket.on('game_over_house_wins', () => {
            document.getElementById('house-wins-overlay').style.display = 'flex';
        });
    </script>
</body>
</html>
