<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK BINGO DELUXE - Telegram Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* ያንተን ምርጥ CSS እዚህ ጋር ሙሉ በሙሉ ጠብቄዋለሁ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #fdbb2d; --secondary: #b21f1f; --glass: rgba(255, 255, 255, 0.1); }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            min-height: 100vh; color: white; padding: 20px; background-attachment: fixed;
            overflow-x: hidden;
        }

        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .tab {
            padding: 12px 35px; border-radius: 50px; background: rgba(0, 0, 0, 0.5);
            color: white; cursor: pointer; font-weight: bold; border: 2px solid transparent; transition: 0.3s;
        }
        .tab.active { background: linear-gradient(45deg, #fdbb2d, #b21f1f); border: 2px solid white; box-shadow: 0 0 20px #fdbb2d; }

        .container {
            max-width: 1200px; margin: 0 auto; background: rgba(255, 255, 255, 0.1);
            padding: 25px; border-radius: 30px; backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.2); display: none;
        }
        .container.active { display: block; animation: fadeIn 0.5s ease; }

        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px;
            max-height: 400px; overflow-y: auto;
        }
        .box {
            background: white; color: #333; padding: 15px 5px; border-radius: 10px;
            text-align: center; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .box.selected { background: #4CAF50; color: white; transform: scale(1.1); box-shadow: 0 0 15px #4CAF50; }
        .box.sold-out { background: #ff4d4d !important; color: white; cursor: not-allowed; opacity: 0.6; text-decoration: line-through; }

        .number-ball {
            display: inline-block; width: 50px; height: 50px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fdbb2d, #b21f1f);
            color: white; text-align: center; line-height: 50px; margin: 5px;
            font-weight: bold; font-size: 20px; border: 2px solid white;
        }

        .bingo-btn {
            background: linear-gradient(135deg, #ff4444, #b21f1f); color: white; font-size: 2em;
            padding: 15px 50px; border-radius: 50px; border: 3px solid gold; cursor: pointer;
            animation: pulse 1.5s infinite;
        }
        .bingo-btn:disabled { opacity: 0.5; animation: none; cursor: not-allowed; }

        .gridCard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #ddd; padding: 5px; border-radius: 10px; }
        .cell { background: white; color: black; padding: 8px; text-align: center; font-weight: bold; border-radius: 5px; font-size: 14px; }
        .cell.marked { background: #4CAF50 !important; color: white; }
        .cell.free { background: gold; }

        .toast {
            position: fixed; top: 20px; right: 20px; background: #333; color: white;
            padding: 15px 25px; border-radius: 10px; border-left: 5px solid gold; z-index: 10000;
            animation: slideIn 0.3s ease;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab active" id="p-tab" onclick="switchTab('player')">👤 ተጫዋች</button>
        <button id="admin-tab-btn" class="tab" style="display:none;" onclick="switchTab('admin')">👑 አድሚን</button>
    </div>

    <div id="playerTab" class="container active">
        <h1 style="text-align: center; margin-bottom: 10px; text-shadow: 0 0 15px gold;">🎰 MK BINGO DELUXE</h1>
        <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 20px;">
            <h2>💰 ባላንስ: <span id="playerBalance" style="color: gold;">1000</span> ETB</h2>
        </div>

        <div id="selectPage">
            <div id="grid" class="card-grid"></div>
            <div style="text-align: center; margin-top: 20px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px;">
                <p>የተመረጡ: <span id="selectedCount" style="color: gold;">0</span> | ጠቅላላ: <span id="totalPrice" style="color: gold;">0</span> ETB</p>
                <button onclick="confirmCards()" style="width: 100%; padding: 18px; background: #27ae60; border: none; border-radius: 50px; color: white; font-weight: bold; margin-top: 15px; cursor: pointer;">ካርድ ግዛ እና ተቀላቀል</button>
            </div>
        </div>

        <div id="gamePage" style="display: none; text-align: center;">
            <div id="numbersList" style="margin-bottom: 20px; min-height: 70px;"></div>
            <button class="bingo-btn" id="bingoBtn" onclick="callBingo()" disabled>BINGO!</button>
            <div id="gameCards" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px;"></div>
        </div>
    </div>

    <div id="adminTab" class="container">
        <h2>👑 አድሚን መቆጣጠሪያ</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;">
            <input type="number" id="cardPriceInput" value="10" placeholder="ዋጋ">
            <button onclick="startNewRound()" style="background: #27ae60; color: white; border: none; border-radius: 10px;">ዙር አስጀምር</button>
        </div>
        <button onclick="drawNumber()" style="width: 100%; padding: 20px; background: #2980b9; color: white; border: none; border-radius: 15px; font-weight: bold;">ቁጥር ጥራ (DRAW)</button>
        <div id="adminStats" style="margin-top: 20px;">
            <p>የተሸጡ ካርዶች: <span id="adminTotalCards">0</span></p>
            <p>ጠቅላላ ገቢ: <span id="adminTotalPool">0</span> ETB</p>
        </div>
    </div>

    <div id="winner-overlay" class="overlay">
        <h1 style="color: gold; font-size: 3em;">🎉 BINGO! 🎉</h1>
        <h2 id="winner-name"></h2>
        <div id="winner-card-box"></div>
        <button onclick="location.reload()" style="padding: 15px 40px; background: gold; border: none; border-radius: 20px; margin-top: 20px;">ቀጥል</button>
    </div>

    <div id="house-wins-overlay" class="overlay">
        <h1 style="color: white;">🛑 አሸናፊ የለም!</h1>
        <p style="margin: 20px;">ገንዘቡ ወደ አስተዳዳሪው ተላልፏል።</p>
        <button onclick="location.reload()" style="padding: 10px 30px; background: white; border-radius: 10px;">እሺ</button>
    </div>

    <script>
        const socket = io();
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 12345678; // <-- ያንተን ID እዚህ ተካ

        let user = tg.initDataUnsafe?.user || { id: 0, first_name: "ተጫዋች" };
        let selectedCards = {};
        let myCards = {};
        let calledNumbers = [];

        tg.expand();

        if (user.id === ADMIN_ID) document.getElementById('admin-tab-btn').style.display = 'block';

        // Grid Creation
        const grid = document.getElementById("grid");
        for (let i = 1; i <= 1000; i++) {
            let d = document.createElement("div");
            d.className = "box"; d.innerText = i; d.id = `card-${i}`;
            d.onclick = () => {
                if (d.classList.contains('sold-out')) return;
                if (selectedCards[i]) { delete selectedCards[i]; d.classList.remove('selected'); }
                else { selectedCards[i] = generateBingoNumbers(); d.classList.add('selected'); }
                updateSummary();
            };
            grid.appendChild(d);
        }

        function generateBingoNumbers() {
            let n = [];
            while(n.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!n.includes(r)) n.push(r);
            }
            n[12] = "FREE"; return n;
        }

        function updateSummary() {
            let count = Object.keys(selectedCards).length;
            document.getElementById("selectedCount").innerText = count;
            document.getElementById("totalPrice").innerText = count * document.getElementById('cardPriceInput').value;
        }

        function switchTab(tab) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        function confirmCards() {
            const ids = Object.keys(selectedCards).map(Number);
            if (ids.length === 0) return showToast("ካርድ ይምረጡ!");
            myCards = JSON.parse(JSON.stringify(selectedCards));
            socket.emit('buy_card', { user_id: user.id, cards: ids, name: user.first_name });
        }

        socket.on('purchase_success', (data) => {
            document.getElementById('playerBalance').innerText = data.newBalance;
            document.getElementById('selectPage').style.display = 'none';
            document.getElementById('gamePage').style.display = 'block';
            renderMyCards();
        });

        function renderMyCards() {
            const container = document.getElementById('gameCards'); container.innerHTML = "";
            for (let id in myCards) {
                let div = document.createElement('div');
                div.innerHTML = `<h4 style="color:gold;">Card #${id}</h4>`;
                let g = document.createElement('div'); g.className = "gridCard";
                myCards[id].forEach(n => {
                    let c = document.createElement('div');
                    c.className = "cell" + (n === "FREE" ? " free" : "");
                    c.innerText = n; g.appendChild(c);
                });
                div.appendChild(g); container.appendChild(div);
            }
        }

        socket.on('number_update', (data) => {
            calledNumbers.push(data.num);
            const ball = document.createElement("span"); ball.className = "number-ball"; ball.innerText = data.num;
            document.getElementById("numbersList").prepend(ball);
            document.querySelectorAll('.cell').forEach(c => { if(c.innerText == data.num) c.classList.add('marked'); });
            document.getElementById('bingoBtn').disabled = false;
        });

        function startNewRound() { socket.emit('admin_start_round', { price: document.getElementById('cardPriceInput').value }); }
        function drawNumber() { socket.emit('admin_draw_number'); }
        function callBingo() { socket.emit('claim_bingo', { user_id: user.id, name: user.first_name }); }

        socket.on('show_winner', (data) => {
            document.getElementById('winner-overlay').style.display = 'flex';
            document.getElementById('winner-name').innerText = data.winner_name;
            document.getElementById('winner-card-box').innerHTML = data.card_html;
            if(tg.HapticFeedback) tg.HapticFeedback.notification('success');
        });

        socket.on('game_over_house_wins', () => { document.getElementById('house-wins-overlay').style.display = 'flex'; });
    </script>
</body>
</html>
